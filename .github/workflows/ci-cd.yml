```yaml
name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build Backend with Maven
        run: mvn clean package
        working-directory: ./springboot/app

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Back-End to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-backend:latest

      - name: Build and Push Frontend to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-frontend:latest

      - name: Update docker-compose with DockerHub images
        run: |
          sed -i "s|spring-boot-app:latest|${{ secrets.DOCKERHUB_USERNAME }}/tp-backend:latest|g" docker-compose.yml
          sed -i "s|angular-app:latest|${{ secrets.DOCKERHUB_USERNAME }}/tp-frontend:latest|g" docker-compose.yml

      - name: Pull images and run Docker Compose
        run: |
          docker compose pull
          docker compose up -d

      - name: Show running containers
        run: docker ps
